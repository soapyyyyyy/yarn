<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yarn Repeat Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Yarn Repeat Visualizer</h1>

  <input id="repeatLength" type="number" value="20">
  <input id="cmPerStitch" type="number" value="0.5" step="0.1">
  <input id="stitchesPerRow" type="number" value="20">
  <input id="rows" type="number" value="10">

  <input id="colorPicker" type="color" value="#ff0000">

  <button id="makeYarn">Make Yarn Strip</button>
  <button id="makeGrid">Make Fabric Grid</button>

  <div id="yarnStrip"></div>
  <div id="fabricGrid"></div>

  <script src="script.js"></script>
</body>
</html>
